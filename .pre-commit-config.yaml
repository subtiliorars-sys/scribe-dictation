# Pre-commit hooks for scribe-dictation
# Install: pip install pre-commit && pre-commit install

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: detect-private-key
        exclude: ^tests/

  - repo: https://github.com/zricethezav/gitleaks
    rev: v8.21.0
    hooks:
      - id: gitleaks
        args: [--verbose]

  # Ecosystem git-guards convention (ported from Cairn's/CodeMonkeys'
  # .githooks/pre-push.d/20-brand-lint): block sibling-brand / program-
  # affiliation strings on this repo's docs surface. See scripts/brand_lint.py
  # and .githooks/brand-wordlist.txt.
  - repo: local
    hooks:
      - id: brand-lint
        name: brand / program-affiliation lint
        entry: python scripts/brand_lint.py
        language: system
        pass_filenames: true
